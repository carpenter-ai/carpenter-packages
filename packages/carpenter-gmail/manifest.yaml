name: carpenter-gmail
version: "0.7.4"
description: |
  Email assistant package (Gmail API backend).  Phase 1 shipped read
  templates through the D24 untrusted-data pipeline and send mail
  with an expected-account safety check.  Phase 1.5 (v0.2.0) added
  three external-effect modify tools — pkg_gmail_archive_email,
  pkg_gmail_mark_read_email, pkg_gmail_draft_email — each guarded by
  a chat-boundary human-confirm and an in-script expected-account
  check.

  Phase 1.5 v2 (v0.3.0) makes ALL four write tools (send, archive,
  mark-read, draft) go through the full untrusted-data graduation
  pipeline: an EXECUTOR arc that POSTs to Gmail and writes a small
  structured receipt as an untrusted Resource, a REVIEWER arc with a
  static prompt that extracts a typed EmailXxxResult dataclass, and a
  deterministic Python JUDGE that bounds-checks every field before
  graduating the extract to trusted state.  This closes the
  trust-invariant I3 hole in the earlier modify shape.

  Phase 3a (this version, 0.4.0) introduces inbound polling: an
  in-process GmailPollTrigger calls users.history.list every 15
  minutes and emits one email.received event per newly-arrived
  message.  The package's trigger_subscriptions fans each event into
  a per-message email_triage arc tree (PLANNER -> EXECUTOR -> REVIEWER
  -> JUDGE) which graduates one EmailTriageExtract (category +
  sanitized subject + flags) to chat context.  No body or raw header
  content ever leaves the JUDGE gate.

  Read-side ships three review templates (simple text, meeting
  invite, order confirmation), unchanged.

  Phase 3b (0.5.0) surfaces email attachment METADATA
  (filename, MIME, size, attachmentId, is_inline) into the four
  read-side extracts (simple_text, meeting_invite,
  order_confirmation, email_triage).  No bytes are fetched and no
  new Gmail scope is required — the data is already present in the
  existing users.messages.get full-format response.  See
  kb/attachments.md for the trust contract.

  Phase 4 (this version, 0.6.0) introduces a per-package semantic
  resource index.  Three PollableTriggers (60-second cadence)
  backfill the mailbox in descending internalDate order (Phase 1),
  re-index pre-seeded message-id lists (Phase 2), and pick up
  newly-arrived messages via Gmail history.list (incremental).
  Each tick spawns a PLANNER -> EXECUTOR -> REVIEWER -> JUDGE arc
  tree that emits one JUDGE-validated EmailIndexFetchedBatch; the
  trigger then embed+upserts the validated metadata into the
  carpenter-gmail PackageVectorStore in trusted post-JUDGE context.
  No core-platform changes — vector floats never appear in a
  trusted-context string (package-internal invariant E1).  See
  kb/email/index.md for the trust contract and operator model.

chat_tools:
  - tools.py

kb_namespace: email

platform_compatibility:
  - any

# Trust-graduating dataclasses (D24 SD11).  Each read or write
# template emits its own kind so a malicious REVIEWER cannot upcast
# (e.g.) a meeting-invite extract into an order-confirmation
# extract, nor an archive receipt into a send receipt.
data_models:
  - EmailReviewBriefing
  - EmailSimpleTextExtract
  - EmailMeetingInviteExtract
  - EmailOrderConfirmationExtract
  - EmailSendResult
  - EmailArchiveResult
  - EmailMarkReadResult
  - EmailDraftResult
  - EmailTriageExtract
  # Phase 3b: sub-component carried inside the four read-side extracts
  # above.  Not consumed standalone, but registered as its own kind so
  # the dispatch loader can resolve the ``tuple[AttachmentMetadata, ...]``
  # field annotations.
  - AttachmentMetadata
  # Phase 4: semantic resource index.  Two new graduating kinds plus
  # the per-entry sub-component carried inside each batch.
  - EmailIndexFetchedEntry
  - EmailIndexFetchedBatch
  - EmailIndexBatchReceipt

# Seven templates total: three Phase 1 read templates plus four
# Phase 1.5 v2 write templates.  All seven share the canonical
# PLANNER -> EXECUTOR (untrusted Gmail call) -> REVIEWER
# (constrained, static prompt, no KB, only derive_resource) ->
# JUDGE (deterministic Python) shape.
arc_templates:
  - name: email_read_simple_text
    path: templates/email-read-simple-text/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailSimpleTextExtract
    judge_handler: judges:judge_simple_text
  - name: email_read_meeting_invite
    path: templates/email-read-meeting-invite/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailMeetingInviteExtract
    judge_handler: judges:judge_meeting_invite
  - name: email_read_order_confirmation
    path: templates/email-read-order-confirmation/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailOrderConfirmationExtract
    judge_handler: judges:judge_order_confirmation
  - name: email_write_send
    path: templates/email-write-send/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailSendResult
    judge_handler: judges:judge_email_send
  - name: email_write_archive
    path: templates/email-write-archive/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailArchiveResult
    judge_handler: judges:judge_email_archive
  - name: email_write_mark_read
    path: templates/email-write-mark-read/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailMarkReadResult
    judge_handler: judges:judge_email_mark_read
  - name: email_write_draft
    path: templates/email-write-draft/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailDraftResult
    judge_handler: judges:judge_email_draft
  - name: email_triage
    path: templates/email-triage/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailTriageExtract
    judge_handler: judges:judge_email_triage
  # Phase 4: semantic resource index.  All three share the same
  # graduating kind and the same JUDGE handler (the handler reads
  # ``phase`` off the dataclass to apply phase-specific rules).
  - name: email_index_phase1
    path: templates/email-index-phase1/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailIndexFetchedBatch
    judge_handler: judges:judge_email_index_fetched_batch
  - name: email_index_phase2
    path: templates/email-index-phase2/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailIndexFetchedBatch
    judge_handler: judges:judge_email_index_fetched_batch
  - name: email_index_incremental
    path: templates/email-index-incremental/template.yaml
    briefing_kind: EmailReviewBriefing
    extract_kind: EmailIndexFetchedBatch
    judge_handler: judges:judge_email_index_fetched_batch

judge_handlers:
  - name: judge_simple_text
    module: judges
  - name: judge_meeting_invite
    module: judges
  - name: judge_order_confirmation
    module: judges
  - name: judge_email_send
    module: judges
  - name: judge_email_archive
    module: judges
  - name: judge_email_mark_read
    module: judges
  - name: judge_email_draft
    module: judges
  - name: judge_email_triage
    module: judges
  # Phase 4 JUDGES.  ``judge_email_index_fetched_batch`` validates
  # the per-tick metadata harvest before the trigger embeds + upserts.
  # ``judge_email_index_batch`` validates the post-embed audit receipt.
  - name: judge_email_index_fetched_batch
    module: judges
  - name: judge_email_index_batch
    module: judges

# KB articles seeded into kb/email/* on install.
kb_articles:
  - slug: email/overview
    path: kb/email/overview.md
  - slug: email/policy-setup
    path: kb/email/policy-setup.md
  - slug: email/trust-warning
    path: kb/email/trust-warning.md
  - slug: email/style
    path: kb/email/style.md
  - slug: email/inbound-triage
    path: kb/email/inbound-triage.md
  - slug: email/attachments
    path: kb/email/attachments.md
  - slug: email/index
    path: kb/email/index.md
  - slug: email/search
    path: kb/email/search.md

# Phase 3a: in-process trigger that polls Gmail history every 15
# minutes and emits one email.received event per newly-arrived
# message id.  The trigger does NOT fetch message bodies; that is
# the triage arc's job.
triggers:
  - name: gmail-inbound-poll
    type: gmail_poll
    module: triggers/gmail_poll.py
    enabled: true
    config:
      cadence_seconds: 900   # 15 minutes
      event_type: email.received
  # Phase 4: three semantic-index triggers.  All three share the
  # ``index_running`` CAS mutex so only one tick runs at a time
  # (per ``_index_common.IndexTriggerBase``).
  - name: gmail-index-phase1
    type: email_index_phase1
    module: triggers/email_index_phase1.py
    enabled: true
    config:
      cadence_seconds: 60
      max_batch: 100
  - name: gmail-index-phase2
    type: email_index_phase2
    module: triggers/email_index_phase2.py
    enabled: true
    config:
      cadence_seconds: 60
      max_batch: 50
  - name: gmail-index-incremental
    type: email_index_incremental
    module: triggers/email_index_incremental.py
    enabled: true
    config:
      cadence_seconds: 60
      max_batch: 25

# Phase 3a: route each email.received event into a triage arc tree.
# The handler is a thin shim that spawns the email_triage arc tree
# (see carpenter_gmail.handlers.triage_inbound).
trigger_subscriptions:
  - event: email.received
    handler: handlers.triage_inbound:handle_email_received

# Phase 1 ships ZERO sender allowlist proposals.  The user populates
# the email allowlist via pkg_gmail_trust_sender (chat tool), one
# entry at a time, with the standard human-confirm flow.  This keeps
# the accumulation-attack threat (T9) from biting.
#
# Phase 1 DOES propose two domain entries (Gmail API endpoints) so
# the EXECUTOR can reach Google.
allowlist_proposals:
  - type: domain
    value: gmail.googleapis.com
  - type: domain
    value: oauth2.googleapis.com

# Gmail OAuth credential requirement.  Phase 1 needed gmail.readonly
# (for list/search/read), gmail.send (for send_email), and
# userinfo.email (for the expected-account check).  Phase 1.5 added
# gmail.modify (archive + mark-read use ``users.messages.modify``
# with ``removeLabelIds``) and gmail.compose (for draft creation).
# Phase 1.5 v2 does not introduce any new scope demands.
#
# Why five explicit scopes instead of collapsing to gmail.modify:
# gmail.modify alone would grant delete-message authority.  We
# deliberately want the narrower grant.  Five explicit scopes is the
# audit-readable shape.
#
# Migration note for v0.1.0 users: Google supports incremental
# authorisation, so re-running pkg_gmail_authorize once augments the
# token's scope set without revoking existing grants.  The platform's
# generic OAuth-callback flow (carpenter/api/oauth.py) handles the
# redirect-and-exchange round-trip and writes tokens to the platform
# .env under the GMAIL_OAUTH_ prefix.
credential_requirements:
  - kind: oauth
    provider: google
    env_key_prefix: GMAIL_OAUTH
    authorize_url: https://accounts.google.com/o/oauth2/v2/auth
    token_url: https://oauth2.googleapis.com/token
    scopes:
      - https://www.googleapis.com/auth/gmail.readonly
      - https://www.googleapis.com/auth/gmail.send
      - https://www.googleapis.com/auth/gmail.modify
      - https://www.googleapis.com/auth/gmail.compose
      - https://www.googleapis.com/auth/userinfo.email
