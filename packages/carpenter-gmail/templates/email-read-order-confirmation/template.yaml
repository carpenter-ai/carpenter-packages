name: email_read_order_confirmation
description: |
  Read one Gmail order/receipt confirmation message and emit a
  structured order extract.  Same shape as email_read_simple_text
  but the REVIEWER additionally pulls vendor / total / order_id /
  items, and the JUDGE caps each item's length and bans control
  characters across all extra fields.
steps:
  - name: prepare-briefing
    description: |
      Construct EmailReviewBriefing.  Trusted PLANNER context.
    order: 0
    agent_type: PLANNER
    model_policy: fast-chat
  - name: fetch-gmail
    description: |
      Untrusted EXECUTOR step.  Pre-verified Gmail-fetch script.
    order: 1
    agent_type: EXECUTOR
    integrity_level: untrusted
    model_policy: background-batch
  - name: review-extract
    description: |
      Constrained REVIEWER step with a static prompt.  Reads
      briefing + raw email JSON; writes one pending
      EmailOrderConfirmationExtract Resource (with vendor, total,
      order_id, items, body_summary, flags) via derive_resource.
      No KB access.
    order: 2
    agent_type: REVIEWER
    model_policy: careful-coding
    arc_role: verifier
  - name: judge-extract
    description: |
      Deterministic JUDGE step — dispatched to
      ``judges:judge_order_confirmation``.  Caps vendor/total/
      order_id/items lengths, bans control characters, caps items
      list at 8.  No AI agent.
    order: 3
    agent_type: JUDGE
